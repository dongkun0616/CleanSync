name: Deploy to EC2

on:
  push:
    branches:
      - main
    # collector나 frontend 폴더에 변화가 있을 때만 실행
    paths:
      - 'collector/**'
      - 'frontend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: SSH Remote Commands (Deploy & Build)
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }} # secrets. 추가하여 오타 수정
          script: |
            cd ~/clean-sync
            # 1. 최신 코드 가져오기
            git fetch origin main
            git reset --hard origin/main

            # 2. 컬렉터(Python) 재실행
            echo "Restarting Collector..."
            pkill -f mqtt_to_db.py || true
            cd ~/clean-sync/collector
            # 로그를 파일로 남기도록 설정 (나중에 에러 확인 용이)
            nohup python3 -u mqtt_to_db.py > collector.log 2>&1 &

            # 3. 프론트엔드 빌드 (EC2 내부에서 직접 실행)
            echo "Building Frontend..."
            cd ~/clean-sync/frontend/my-project
            npm install
            npm run build

            # 4. Nginx 재시작 (권한 및 설정 반영)
            echo "Restarting Nginx..."
            sudo systemctl restart nginx