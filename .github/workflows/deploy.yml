name: Deploy to EC2

on:
  push:
    branches:
      - main
    # collector나 frontend 폴더에 변화가 있을 때만 실행
    paths:
      - 'collector/**'
      - 'frontend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: SSH Remote Commands (Deploy & Build)
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }} # secrets. 추가하여 오타 수정
          script: |
            cd ~/clean-sync
            git fetch origin main
            git reset --hard origin/main

            echo "Restarting Collector..."
            # pkill 에러가 나도 스크립트가 멈추지 않게 처리
            pkill -f mqtt_to_db.py || true
            sleep 2
            cd ~/clean-sync/collector
            nohup python3 -u mqtt_to_db.py > collector.log 2>&1 &

            echo "Building Frontend..."
            cd ~/clean-sync/frontend/my-project
            # 빌드 속도를 위해 CI=false 추가 (경고가 에러로 변하는 것 방지)
            CI=false npm install
            CI=false npm run build

            echo "Restarting Nginx..."
            # sudo 실행 시 에러가 나면 알려주도록 설정
            sudo systemctl restart nginx || echo "Nginx restart failed, please check sudoers"