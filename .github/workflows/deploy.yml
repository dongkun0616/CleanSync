name: Deploy to EC2

on:
  push:
    branches:
      - main
    # collector나 frontend 폴더에 변화가 있을 때만 실행
    paths:
      - 'collector/**'
      - 'frontend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: SSH Remote Commands (Deploy & Build)
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }} # secrets. 추가하여 오타 수정
          script: |
script: |
            cd ~/clean-sync
            git fetch origin main
            git reset --hard origin/main

            echo "Restarting Collector..."
            # 기존 프로세스 종료 (실패해도 계속 진행)
            pgrep -f mqtt_to_db.py | xargs kill -9 || true
            
            cd ~/clean-sync/collector
            # nohup과 disown을 조합해 세션 독립
            nohup python3 -u mqtt_to_db.py > collector.log 2>&1 & sleep 1
            disown

            echo "Building Frontend..."
            cd ~/clean-sync/frontend/my-project
            # 빌드 캐시 문제 방지 및 경고 무시
            CI=false npm install --no-audit --no-fund
            CI=false npm run build

            echo "Restarting Nginx..."
            # Nginx 재시작 후 결과와 상관없이 0(성공) 반환하도록 설정
            sudo systemctl restart nginx || true
            echo "Deployment finished successfully!"